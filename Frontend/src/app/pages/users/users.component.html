<div class="container mt-4">
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            {{ usuarioForm.id ? 'Editar Usuario' : 'Nuevo Usuario' }}
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Nombre" [(ngModel)]="usuarioForm.nombre">
                </div>
                <div class="col-md-4">
                    <input type="email" class="form-control" placeholder="Email" [(ngModel)]="usuarioForm.email">
                </div>
                <div class="col-md-4">
                    <button class="btn btn-success w-100" (click)="guardar()">
                        {{ usuarioForm.id ? 'Actualizar' : 'Registrar' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let user of listaUsuarios">
                <td>{{ user.id }}</td>
                <td>{{ user.nombre }}</td>
                <td>{{ user.email }}</td>
                <td>
                    <button class="btn btn-warning btn-sm me-2" (click)="editar(user)">Editar</button>
                    <button class="btn btn-danger btn-sm" (click)="eliminar(user.id)">Eliminar</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
