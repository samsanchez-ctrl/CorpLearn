<div class="login-container">
  <div class="login-card">
    <h2>CorpLearn</h2>
    <p class="subtitle">Inicia sesión para continuar
    <div class="alert-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup] ="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="ejemplo@correo.com"
          [class.input-error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        />
        <small class="error-text" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']">
          El correo es obligatorio.
        </small>
        <small class="error-text" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']">
          Formato de correo inválido.
        </small>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.input-error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
        />
        <small class="error-text" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">
          La contraseña es obligatoria.
        </small>
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Validando...' : 'Ingresar al Sistema' }}
      </button>
    </form>

    <div class="footer-links">
      <p>¿No tienes una cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    </div>
  </div>
</div>
